name: Compile CV

on:
  push:
    branches:
      - main # Change to 'master' if your default branch is named master

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    
    # REQUIRED: Grants the action permission to create a release
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: OscarAnghammarCV.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-cv
          path: OscarAnghammarCV.pdf

      # Creates or updates a release tagged "latest" with your new PDF
      - name: Update Latest Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "OscarAnghammarCV.pdf"
          name: "Latest CV"
          tag: "latest"
          body: "Automatically compiled PDF of my CV."
          token: ${{ secrets.GITHUB_TOKEN }}